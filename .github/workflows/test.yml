name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install tomli
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Install doctor uninstall smoke
        shell: pwsh
        run: |
          $tmpHome = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $tmpHome | Out-Null
          $codexHome = Join-Path $tmpHome ".codex"
          $agentsHome = Join-Path $tmpHome ".agents"
          python scripts/install.py --codex-home "$codexHome" --agents-home "$agentsHome" --agents-mode merge --install-mode copy
          python scripts/doctor.py --codex-home "$codexHome" --agents-home "$agentsHome"
          python scripts/uninstall.py --codex-home "$codexHome" --agents-home "$agentsHome" --restore-config
